# XAI Project Configuration
# Stability-Enhanced LIME for Russian Sentiment Analysis

model:
  name: "DeepPavlov/rubert-base-cased"
  num_labels: 3
  max_length: 128
  batch_size: 8
  epochs: 5
  learning_rate: 2e-5

data:
  # Download from Kaggle: https://www.kaggle.com/datasets/mar1mba/russian-sentiment-dataset
  train_path: "data/sentiment_dataset.csv"
  test_path: null
  label_names: ["neutral", "positive", "negative"]

# Vanilla LIME settings
lime:
  num_samples: 5000
  num_features: 10
  kernel_width: 25.0

# Stability-Enhanced LIME (MINDFUL-LIME inspired)
enhanced_lime:
  num_samples: 5000
  num_features: 10
  kernel_width: 25.0
  phrase_max_len: 3
  adjacency_window: 2
  mask_rate: 0.4
  propagation_prob: 0.3
  n_runs: 5

# Evaluation
evaluation:
  stability_runs: 10
  faithfulness_top_k: 5
  case_study_texts:
    - "Фильм был отличный, очень понравилась игра актёров!"
    - "Ужасный сервис, больше никогда не приду сюда."
    - "Обычный продукт, ничего особенного не заметил."
    - "Потрясающая книга, не мог оторваться до последней страницы!"
    - "Качество оставляет желать лучшего, разочарован покупкой."
